<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AstrixOS - A complete browser-based operating system">
    <title>AstrixOS</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%236366f1'>✦</text></svg>">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/boot.css">
    <link rel="stylesheet" href="css/lock.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/taskbar.css">
    <link rel="stylesheet" href="css/window.css">
    <link rel="stylesheet" href="css/notifications.css">
    <link rel="stylesheet" href="css/settings.css">
</head>
<body>
    <!-- Boot Screen -->
    <div id="boot-screen" class="boot-screen active">
        <div class="boot-content">
            <div class="boot-logo">✦</div>
            <div class="boot-text">AstrixOS</div>
            <div class="boot-progress">
                <div class="boot-progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Lock Screen -->
    <div id="lock-screen" class="lock-screen">
        <div class="lock-content">
            <div class="lock-time" id="lock-time">12:00</div>
            <div class="lock-date" id="lock-date">Monday, January 1</div>
            <div class="lock-hint">Click or press any key to unlock</div>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-container">
            <div class="login-card">
                <div class="login-logo">✦</div>
                <h1>AstrixOS</h1>
                <form id="login-form">
                    <div class="login-group">
                        <input type="text" id="username" placeholder="Username" required autocomplete="off">
                    </div>
                    <div class="login-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="login-button">Sign In</button>
                </form>
                <div class="login-footer">Demo: Use any username and password</div>
            </div>
        </div>
    </div>

    <!-- Main Desktop Environment -->
    <div id="desktop-environment" class="desktop-environment">
        <!-- Desktop -->
        <div id="desktop" class="desktop"></div>

        <!-- Windows Container -->
        <div id="windows-container" class="windows-container"></div>

        <!-- Taskbar -->
        <div id="taskbar" class="taskbar">
            <div class="taskbar-left">
                <button id="start-menu-btn" class="taskbar-btn start-btn" title="Start Menu">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <rect x="2" y="2" width="6" height="6"/>
                        <rect x="12" y="2" width="6" height="6"/>
                        <rect x="2" y="12" width="6" height="6"/>
                        <rect x="12" y="12" width="6" height="6"/>
                    </svg>
                </button>
                <div class="taskbar-search">
                    <input type="text" id="taskbar-search" placeholder="Search..." class="search-input">
                </div>
            </div>
            <div id="taskbar-apps" class="taskbar-apps"></div>
            <div class="taskbar-right">
                <button id="notification-btn" class="taskbar-btn" title="Notifications">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10 2c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2s2-.9 2-2V4c0-1.1-.9-2-2-2zm5 3c0 1.66 1.34 3 3 3v2c0 2.21-1.79 4-4 4v3c0 .55-.45 1-1 1s-1-.45-1-1v-3c-2.21 0-4-1.79-4-4V5c0-1.66 1.34-3 3-3h4z"/>
                    </svg>
                </button>
                <button id="settings-btn" class="taskbar-btn" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10 1c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2s2-.9 2-2V3c0-1.1-.9-2-2-2zm7.43 2.58c-.78-.78-2.05-.78-2.83 0l-1.41 1.41c-.78.78-.78 2.05 0 2.83l1.41 1.41c.78.78 2.05.78 2.83 0l1.41-1.41c.78-.78.78-2.05 0-2.83l-1.41-1.41zM19 10c0-1.1-.9-2-2-2h-2c-1.1 0-2 .9-2 2s.9 2 2 2h2c1.1 0 2-.9 2-2zm-2.58 7.43l-1.41-1.41c-.78-.78-2.05-.78-2.83 0l-1.41 1.41c-.78.78-.78 2.05 0 2.83l1.41 1.41c.78.78 2.05.78 2.83 0l1.41-1.41c.78-.78.78-2.05 0-2.83zM10 19c1.1 0 2-.9 2-2v-2c0-1.1-.9-2-2-2s-2 .9-2 2v2c0 1.1 .9 2 2 2zM2.58 17.43l1.41 1.41c.78.78 2.05.78 2.83 0l1.41-1.41c.78-.78.78-2.05 0-2.83l-1.41-1.41c-.78-.78-2.05-.78-2.83 0l-1.41 1.41c-.78.78-.78 2.05 0 2.83zM3 10c0 1.1.9 2 2 2h2c1.1 0 2-.9 2-2s-.9-2-2-2H5c-1.1 0-2 .9-2 2zM2.58 2.58l1.41 1.41c.78.78 2.05.78 2.83 0l1.41-1.41c.78-.78.78-2.05 0-2.83L7.43 0c-.78.78-2.05.78-2.83 0L2.58 2.58c-.78.78-.78 2.05 0 2.83z"/>
                    </svg>
                </button>
                <div class="system-tray">
                    <div id="clock" class="clock">12:00</div>
                </div>
            </div>
        </div>

        <!-- Start Menu -->
        <div id="start-menu" class="start-menu">
            <div class="start-header">
                <h2>Start</h2>
                <button class="start-close" id="start-close">&times;</button>
            </div>
            <div class="start-content">
                <div class="start-section">
                    <h3>Pinned</h3>
                    <div id="start-pinned" class="start-apps"></div>
                </div>
                <div class="start-section">
                    <h3>All Apps</h3>
                    <div id="start-all-apps" class="start-apps"></div>
                </div>
            </div>
        </div>

        <!-- Notification Center -->
        <div id="notification-center" class="notification-center">
            <div class="notification-header">
                <h2>Notifications</h2>
                <button class="notification-clear" id="notification-clear">Clear All</button>
            </div>
            <div id="notifications-list" class="notifications-list"></div>
        </div>

        <!-- Quick Settings -->
        <div id="quick-settings" class="quick-settings">
            <div class="quick-settings-header">
                <h2>Quick Settings</h2>
                <button class="quick-settings-close" id="quick-settings-close">&times;</button>
            </div>
            <div class="quick-settings-content">
                <div class="quick-setting-item">
                    <label>Brightness</label>
                    <input type="range" id="brightness-slider" min="50" max="100" value="100" class="slider">
                </div>
                <div class="quick-setting-item">
                    <label>Volume</label>
                    <input type="range" id="volume-slider" min="0" max="100" value="50" class="slider">
                </div>
                <div class="quick-setting-item toggle">
                    <label>Dark Mode</label>
                    <input type="checkbox" id="dark-mode-toggle" class="toggle-switch">
                </div>
                <div class="quick-setting-item toggle">
                    <label>WiFi</label>
                    <input type="checkbox" id="wifi-toggle" class="toggle-switch" checked>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast Container -->
    <div id="notification-toasts" class="notification-toasts"></div>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu" style="display: none;">
        <div id="context-menu-items"></div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
